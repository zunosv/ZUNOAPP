<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZUNO</title>

<link rel="icon" href="recursos/zlogo.png">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

/* ── TOKENS ───────────────────────── */

:root{

--bg-base:#0a0e1a;
--bg-surface:#111827;
--bg-card:rgba(255,255,255,0.05);

--border:rgba(255,255,255,0.08);

--primary:#00c896;
--primary-glow:rgba(0,200,150,0.35);

--accent:#6366f1;

--text-primary:#f1f5f9;
--text-muted:#64748b;

--radius:16px;

--shadow-card:
0 4px 10px rgba(0,0,0,0.4),
0 10px 30px rgba(0,0,0,0.6);

--shadow-glow:0 0 20px var(--primary-glow);

--font-display:'Plus Jakarta Sans',sans-serif;
--font-body:'DM Sans',sans-serif;

}

body{
background:
radial-gradient(circle at 20% 20%,#1f2937,transparent),
radial-gradient(circle at 80% 0%,#111827,transparent),
var(--bg-base);

font-family:var(--font-body);

color:var(--text-primary);

}

/* cards */

.card{

background:var(--bg-card);

backdrop-filter:blur(10px);

border:1px solid var(--border);

border-radius:var(--radius);

box-shadow:var(--shadow-card);

padding:20px;

}

/* botones */

.btn{

background:linear-gradient(135deg,#00c896,#00a77a);

padding:14px;

border-radius:12px;

font-weight:600;

box-shadow:var(--shadow-glow);

transition:0.25s;

}

.btn:hover{

transform:translateY(-2px);

}

/* input */

.input{

background:rgba(255,255,255,0.05);

border:1px solid var(--border);

padding:14px;

border-radius:12px;

width:100%;

}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect} = React

/* FIREBASE */

const firebaseConfig={

apiKey:"AIzaSyAqXjnH6WrXuEQivE3RGwvav1qyFOOyoeY",
authDomain:"zuno-1285e.firebaseapp.com",
projectId:"zuno-1285e"

}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

function App(){

const [view,setView]=useState("login")
const [user,setUser]=useState(null)
const [tab,setTab]=useState("home")

/* login */

const [phone,setPhone]=useState("")
const [password,setPassword]=useState("")

/* ticket */

const [tickets,setTickets]=useState([])
const [loading,setLoading]=useState(false)

/* ticket form */

const [monto,setMonto]=useState("")
const [comercio,setComercio]=useState("Texaco")

/* LOGIN */

const login=async()=>{

const snap=await db.collection("users")
.where("phone","==",phone)
.where("password","==",password)
.get()

if(snap.empty){
alert("usuario incorrecto")
return
}

const doc=snap.docs[0]

setUser({id:doc.id,...doc.data()})

setView("dashboard")

}

/* CARGAR TICKETS */

const loadTickets=async()=>{

setLoading(true)

const snap=await db.collection("tickets")
.where("userId","==",user.id)
.get()

const list=snap.docs.map(d=>({id:d.id,...d.data()}))

setTickets(list)

setLoading(false)

}

/* SUBIR TICKET */

const uploadTicket=async()=>{

await db.collection("tickets").add({

userId:user.id,
userName:user.nombre,

monto:parseFloat(monto),

comercio,

cashback:monto*0.03,

status:"pending",

createdAt:Date.now()

})

alert("ticket enviado")

setMonto("")

}

/* cargar tickets al entrar */

useEffect(()=>{

if(tab==="tickets"){
loadTickets()
}

},[tab])

return(

<div className="min-h-screen pb-24">

{/* LOGIN */}

{view==="login" && (

<div className="flex items-center justify-center min-h-screen p-6">

<div className="card w-full max-w-sm space-y-4">

<h2 style={{fontFamily:"var(--font-display)"}} className="text-2xl font-bold text-center">

Bienvenido a ZUNO

</h2>

<input
className="input"
placeholder="Teléfono"
value={phone}
onChange={e=>setPhone(e.target.value)}
/>

<input
className="input"
type="password"
placeholder="Contraseña"
value={password}
onChange={e=>setPassword(e.target.value)}
/>

<button className="btn w-full" onClick={login}>

Entrar

</button>

</div>

</div>

)}

{/* DASHBOARD */}

{view==="dashboard" && user && (

<div className="p-6 space-y-6">

{/* HOME */}

{tab==="home" && (

<div className="card">

<h2 className="text-xl font-bold">

Hola {user.nombre}

</h2>

<p className="text-gray-400">

Saldo disponible

</p>

<h2 className="text-3xl font-bold">

${user.balance}

</h2>

</div>

)}

{/* SUBIR TICKET */}

{tab==="upload" && (

<div className="card space-y-4">

<h3 className="font-semibold">

Subir Ticket

</h3>

<input
className="input"
type="number"
placeholder="Monto"
value={monto}
onChange={e=>setMonto(e.target.value)}
/>

<select
className="input"
value={comercio}
onChange={e=>setComercio(e.target.value)}
>

<option>Texaco</option>
<option>UNO</option>
<option>Esso</option>

</select>

<button className="btn w-full" onClick={uploadTicket}>

Enviar Ticket

</button>

</div>

)}

{/* MIS TICKETS */}

{tab==="tickets" && (

<div className="space-y-4">

<h3 className="text-lg font-bold">

Mis Tickets

</h3>

{loading && <p>Cargando...</p>}

{tickets.length===0 && !loading && (

<div className="card text-center">

<p className="text-gray-400">

Aún no tienes tickets

</p>

</div>

)}

{tickets.map(t=>(

<div key={t.id} className="card flex justify-between">

<div>

<p className="font-semibold">

${t.monto}

</p>

<p className="text-sm text-gray-400">

{t.comercio}

</p>

</div>

<div>

<p className="text-sm">

{t.status}

</p>

</div>

</div>

))}

</div>

)}

</div>

)}

{/* NAV BAR */}

{view==="dashboard" && (

<nav className="fixed bottom-0 w-full bg-black/40 backdrop-blur border-t border-white/10 flex justify-around py-3">

<button onClick={()=>setTab("home")}>Inicio</button>

<button onClick={()=>setTab("upload")}>Ticket</button>

<button onClick={()=>setTab("tickets")}>Tickets</button>

<button onClick={()=>setTab("profile")}>Perfil</button>

</nav>

)}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
