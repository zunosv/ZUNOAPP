<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZUNO</title>

<link rel="icon" href="recursos/zlogo.png">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

:root{

--primary:#E8192C;
--bg:#0b0e16;
--card:rgba(255,255,255,0.04);
--border:rgba(255,255,255,0.08);

}

body{

background:
radial-gradient(circle at 20% 20%,#1f2937,transparent),
radial-gradient(circle at 80% 0%,#111827,transparent),
var(--bg);

font-family:'DM Sans',sans-serif;
color:#f1f5f9;

}

.card{

background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:20px;
backdrop-filter:blur(10px);

}

.btn{

background:linear-gradient(135deg,#E8192C,#b71220);
padding:14px;
border-radius:12px;
font-weight:600;
transition:.25s;

}

.btn:hover{

transform:translateY(-2px);

}

.sidebar{

position:fixed;
top:0;
left:0;
height:100%;
width:260px;
background:#0f172a;
padding:24px;
transform:translateX(-100%);
transition:.3s;

}

.sidebar.open{

transform:translateX(0);

}

input,select{

background:rgba(255,255,255,0.05);
border:1px solid var(--border);
padding:12px;
border-radius:12px;
width:100%;

}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState}=React

const firebaseConfig={

apiKey:"AIzaSyAqXjnH6WrXuEQivE3RGwvav1qyFOOyoeY",
authDomain:"zuno-1285e.firebaseapp.com",
projectId:"zuno-1285e"

}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

function App(){

const [view,setView]=useState("login")
const [sidebar,setSidebar]=useState(false)
const [user,setUser]=useState(null)

const [phone,setPhone]=useState("")
const [password,setPassword]=useState("")

const [monto,setMonto]=useState("")
const [sucursal,setSucursal]=useState("")
const [ticketImg,setTicketImg]=useState(null)

const cashback=(monto*0.03)||0

/* LOGIN */

const login=async()=>{

const snap=await db.collection("users")
.where("phone","==",phone)
.where("password","==",password)
.get()

if(snap.empty){
return
}

const doc=snap.docs[0]

setUser({id:doc.id,...doc.data()})

setView("home")

}

/* ENVIAR TICKET */

const enviarTicket=async()=>{

await db.collection("tickets").add({

userId:user.id,
userName:user.nombre,
comercio:"Texaco",
sucursal,
monto:parseFloat(monto),
cashback,
status:"pending",
createdAt:Date.now()

})

setView("home")

}

return(

<div className="min-h-screen">

{/* SIDEBAR */}

<div className={`sidebar ${sidebar?"open":""}`}>

<h2 className="text-xl mb-6 font-bold">ZUNO</h2>

<button onClick={()=>setView("home")}>Inicio</button><br/>
<button onClick={()=>setView("ticket")}>Subir Ticket</button><br/>
<button onClick={()=>setView("tickets")}>Mis Tickets</button><br/>
<button onClick={()=>setView("profile")}>Perfil</button>

</div>

{/* HEADER */}

<header className="p-4 flex items-center gap-4">

{view!=="login" && (
<button onClick={()=>setSidebar(!sidebar)}>☰</button>
)}

<img src="recursos/zlogo.png" className="w-6"/>

<h2 className="font-bold">ZUNO</h2>

</header>

{/* LOGIN */}

{view==="login" && (

<div className="p-6">

<div className="card max-w-sm mx-auto space-y-3">

<h2 className="text-xl font-bold">Bienvenido</h2>

<input
placeholder="Teléfono"
value={phone}
onChange={e=>setPhone(e.target.value)}/>

<input
type="password"
placeholder="Contraseña"
value={password}
onChange={e=>setPassword(e.target.value)}/>

<button className="btn w-full" onClick={login}>
Entrar
</button>

</div>

</div>

)}

{/* DASHBOARD */}

{view==="home" && user && (

<div className="p-6 space-y-6">

<div className="flex items-center gap-3">

<div className="w-12 h-12 rounded-full bg-red-600 flex items-center justify-center font-bold">
{user.nombre?.charAt(0)}
</div>

<div>
<h2 className="font-semibold">
Hola {user.nombre}
</h2>
<p className="text-sm text-gray-400">
Bienvenido a ZUNO
</p>
</div>

</div>

<div className="card">

<p className="text-gray-400 text-sm">
Saldo disponible
</p>

<h2 className="text-3xl font-bold mt-1">
${user.balance || "0.00"}
</h2>

</div>

<div
onClick={()=>setView("ticket")}
className="card cursor-pointer hover:scale-[1.02] transition">

<h3 className="text-lg font-semibold">
📸 Subir ticket
</h3>

<p className="text-sm text-gray-400">
Gana cashback con tus compras
</p>

</div>

<div className="card">

<h3 className="font-semibold mb-3">
Comercios participantes
</h3>

<div className="bg-red-600/20 px-3 py-2 rounded-lg inline-block text-sm">
⛽ Texaco
</div>

</div>

</div>

)}

{/* SUBIR TICKET */}

{view==="ticket" && (

<div className="p-6 space-y-4">

<div className="card space-y-3">

<h2 className="font-semibold">
Subir Ticket
</h2>

<select
value={sucursal}
onChange={e=>setSucursal(e.target.value)}>

<option>Selecciona sucursal Texaco</option>
<option>Texaco Escalón</option>
<option>Texaco Santa Tecla</option>
<option>Texaco San Miguel</option>

</select>

<input
type="number"
placeholder="Monto de la compra"
value={monto}
onChange={e=>setMonto(e.target.value)}/>

<input
type="file"
onChange={(e)=>setTicketImg(e.target.files[0])}/>

<div className="card">

<p className="text-sm text-gray-400">
Cashback estimado
</p>

<h2 className="text-xl font-bold">
${cashback.toFixed(2)}
</h2>

</div>

<button
className="btn w-full"
onClick={enviarTicket}>

Enviar Ticket

</button>

</div>

</div>

)}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>

</html>
