<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZUNO</title>

<link rel="icon" href="recursos/zlogo.png">

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{background:#09090F;}
</style>

</head>

<body class="text-white">

<div id="root"></div>

<script type="text/babel">

const {useState} = React

function App(){

const [view,setView] = useState("login")
const [tab,setTab] = useState("home")

/* LOGIN */

function login(){
setView("app")
}

/* UI */

return(

<div className="min-h-screen flex flex-col">

{/* HEADER */}

<header className="flex items-center gap-3 p-4 border-b border-gray-800">

<img src="recursos/zlogo.png" className="w-8"/>

<div>

<div className="font-bold text-lg">ZUNO</div>
<div className="text-xs text-gray-400">Tu dinero más rápido ⚡</div>

</div>

</header>

{/* LOGIN */}

{view==="login" && (

<div className="flex flex-1 items-center justify-center p-6">

<div className="bg-[#14141C] p-8 rounded-2xl w-full max-w-sm">

<div className="text-center mb-6">

<img src="recursos/zlogo.png" className="w-16 mx-auto mb-3"/>

<h2 className="text-xl font-bold">
Iniciar sesión
</h2>

<p className="text-gray-400 text-sm">
Accede a tu billetera ZUNO
</p>

</div>

<input
placeholder="Teléfono"
className="w-full p-3 mb-3 rounded-lg bg-[#1a1a2e]"
/>

<input
type="password"
placeholder="Contraseña"
className="w-full p-3 mb-4 rounded-lg bg-[#1a1a2e]"
/>

<button
onClick={login}
className="w-full bg-red-600 p-3 rounded-xl font-semibold"
>

Entrar

</button>

<p
onClick={()=>setView("register")}
className="text-center text-sm text-gray-400 mt-4 cursor-pointer"
>

Crear cuenta

</p>

</div>

</div>

)}

{/* REGISTRO */}

{view==="register" && (

<div className="flex flex-1 items-center justify-center p-6">

<div className="bg-[#14141C] p-8 rounded-2xl w-full max-w-sm space-y-3">

<h2 className="text-xl font-bold text-center">

Crear cuenta

</h2>

<input placeholder="Nombre" className="w-full p-3 rounded bg-[#1a1a2e]"/>

<input placeholder="DUI" className="w-full p-3 rounded bg-[#1a1a2e]"/>

<input placeholder="Correo" className="w-full p-3 rounded bg-[#1a1a2e]"/>

<input placeholder="Teléfono" className="w-full p-3 rounded bg-[#1a1a2e]"/>

<input type="password" placeholder="Contraseña" className="w-full p-3 rounded bg-[#1a1a2e]"/>

<button
onClick={()=>setView("login")}
className="w-full bg-red-600 p-3 rounded-xl"
>

Registrarme

</button>

<p
onClick={()=>setView("login")}
className="text-center text-sm text-gray-400 cursor-pointer"
>

Volver

</p>

</div>

</div>

)}

{/* APP */}

{view==="app" && (

<div className="flex-1 p-6 pb-24 space-y-6">

{/* HOME */}

{tab==="home" && (

<>

{/* WALLET */}

<div className="bg-gradient-to-r from-red-600 to-red-500 p-6 rounded-2xl">

<p className="text-sm opacity-80">
Saldo disponible
</p>

<h2 className="text-3xl font-bold">

$0.00

</h2>

</div>

{/* ACTIVIDAD */}

<div className="bg-[#14141C] p-5 rounded-xl">

<h3 className="font-semibold mb-3">
Actividad reciente
</h3>

<p className="text-sm text-gray-400">

Aún no tienes movimientos

</p>

</div>

</>

)}

{/* TICKET */}

{tab==="ticket" && (

<div className="bg-[#14141C] p-6 rounded-xl space-y-3">

<h3 className="font-semibold">
Subir ticket
</h3>

<input
type="number"
placeholder="Monto"
className="w-full p-3 rounded bg-[#1a1a2e]"
/>

<select className="w-full p-3 rounded bg-[#1a1a2e]">

<option>Texaco</option>
<option>UNO</option>
<option>Esso</option>

</select>

<input type="file"/>

<button className="w-full bg-red-600 p-3 rounded-xl">

Enviar ticket

</button>

</div>

)}

{/* TICKETS */}

{tab==="tickets" && (

<div className="bg-[#14141C] p-6 rounded-xl">

<h3 className="font-semibold mb-3">
Mis tickets
</h3>

<p className="text-gray-400 text-sm">

No hay tickets aún

</p>

</div>

)}

{/* PERFIL */}

{tab==="profile" && (

<div className="bg-[#14141C] p-6 rounded-xl space-y-3">

<h3 className="font-semibold">

Perfil

</h3>

<p className="text-sm text-gray-400">
Usuario ZUNO
</p>

<button className="w-full bg-red-600 p-3 rounded-xl">

Solicitar retiro

</button>

</div>

)}

</div>

)}

{/* NAV */}

{view==="app" && (

<nav className="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around py-3">

<button onClick={()=>setTab("home")}>Inicio</button>

<button onClick={()=>setTab("ticket")}>Ticket</button>

<button onClick={()=>setTab("tickets")}>Mis tickets</button>

<button onClick={()=>setTab("profile")}>Perfil</button>

</nav>

)}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
