<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZUNO</title>

<link rel="icon" href="recursos/zlogo.png">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{background:#09090F;}
</style>

</head>

<body class="text-white">

<div id="root"></div>

<script type="text/babel">

const {useState} = React

/* FIREBASE */

const firebaseConfig = {
apiKey:"AIzaSyAqXjnH6WrXuEQivE3RGwvav1qyFOOyoeY",
authDomain:"zuno-1285e.firebaseapp.com",
projectId:"zuno-1285e"
}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

/* COMPRESION IMAGEN */

function compressImage(file){

return new Promise(resolve=>{

const reader = new FileReader()

reader.readAsDataURL(file)

reader.onload=e=>{

const img=new Image()

img.src=e.target.result

img.onload=()=>{

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

const width=600
const scale=width/img.width

canvas.width=width
canvas.height=img.height*scale

ctx.drawImage(img,0,0,canvas.width,canvas.height)

resolve(canvas.toDataURL("image/jpeg",0.6))

}

}

})

}

function App(){

const [view,setView]=useState("login")
const [user,setUser]=useState(null)

/* LOGIN */

const [phone,setPhone]=useState("")
const [password,setPassword]=useState("")

/* REGISTRO */

const [nombre,setNombre]=useState("")
const [dui,setDui]=useState("")
const [correo,setCorreo]=useState("")
const [regPhone,setRegPhone]=useState("")
const [regPass,setRegPass]=useState("")

/* TICKET */

const [monto,setMonto]=useState("")
const [comercio,setComercio]=useState("Texaco")
const [img,setImg]=useState(null)

/* LOGIN */

const login=async()=>{

const snap=await db.collection("users")
.where("phone","==",phone)
.where("password","==",password)
.get()

if(snap.empty){

alert("Usuario no encontrado")

return

}

const data=snap.docs[0].data()

setUser(data)

setView("dashboard")

}

/* REGISTRO */

const registrar=async()=>{

if(!nombre||!dui||!correo||!regPhone||!regPass){

alert("Completa todos los datos")

return

}

await db.collection("users").add({

nombre,
dui,
correo,
phone:regPhone,
password:regPass,
balance:0,
createdAt:Date.now()

})

alert("Cuenta creada")

setView("login")

}

/* SUBIR TICKET */

const enviarTicket=async()=>{

if(!img||!monto){

alert("Completa datos")

return

}

const compressed=await compressImage(img)

await db.collection("tickets").add({

phone:user.phone,
monto:parseFloat(monto),
comercio,
status:"pending",
imgBase64:compressed,
createdAt:Date.now()

})

alert("Ticket enviado")

setMonto("")
setImg(null)

}

/* UI */

return(

<div className="min-h-screen">

<header className="flex items-center gap-3 p-4 border-b border-gray-800">

<img src="recursos/zlogo.png" className="w-8"/>

<div>

<div className="font-bold text-lg">ZUNO</div>
<div className="text-xs text-gray-400">Tu dinero más rápido ⚡</div>

</div>

</header>


{/* LOGIN */}

{view==="login"&&(

<div className="flex justify-center mt-20">

<div className="bg-[#14141C] p-8 rounded-xl w-80">

<h2 className="text-xl mb-4">Ingresar</h2>

<input
placeholder="Teléfono"
value={phone}
onChange={e=>setPhone(e.target.value)}
className="w-full p-3 mb-3 rounded bg-[#1a1a2e]"
/>

<input
type="password"
placeholder="Contraseña"
value={password}
onChange={e=>setPassword(e.target.value)}
className="w-full p-3 mb-3 rounded bg-[#1a1a2e]"
/>

<button
onClick={login}
className="w-full bg-red-600 p-3 rounded"
>
Entrar
</button>

<p
onClick={()=>setView("register")}
className="text-center mt-4 text-gray-400 cursor-pointer"
>
Crear cuenta
</p>

</div>

</div>

)}


{/* REGISTRO */}

{view==="register"&&(

<div className="flex justify-center mt-20">

<div className="bg-[#14141C] p-8 rounded-xl w-80">

<h2 className="text-xl mb-4">Registro</h2>

<input
placeholder="Nombre"
value={nombre}
onChange={e=>setNombre(e.target.value)}
className="w-full p-3 mb-3 rounded bg-[#1a1a2e]"
/>

<input
placeholder="DUI"
value={dui}
onChange={e=>setDui(e.target.value)}
className="w-full p-3 mb-3 rounded bg-[#1a1a2e]"
/>

<input
placeholder="Correo"
value={correo}
onChange={e=>setCorreo(e.target.value)}
className="w-full p-3 mb-3 rounded bg-[#1a1a2e]"
/>

<input
placeholder="Teléfono"
value={regPhone}
onChange={e=>setRegPhone(e.target.value)}
className="w-full p-3 mb-3 rounded bg-[#1a1a2e]"
/>

<input
type="password"
placeholder="Contraseña"
value={regPass}
onChange={e=>setRegPass(e.target.value)}
className="w-full p-3 mb-3 rounded bg-[#1a1a2e]"
/>

<button
onClick={registrar}
className="w-full bg-red-600 p-3 rounded"
>
Crear cuenta
</button>

<p
onClick={()=>setView("login")}
className="text-center mt-4 text-gray-400 cursor-pointer"
>
Volver
</p>

</div>

</div>

)}


{/* DASHBOARD */}

{view==="dashboard"&&(

<div className="p-6 space-y-6">

<div className="bg-[#14141C] p-6 rounded-xl">

<p className="text-gray-400">Saldo</p>

<h2 className="text-3xl font-bold">$0.00</h2>

</div>

<div className="bg-[#14141C] p-6 rounded-xl space-y-3">

<h3>Subir ticket</h3>

<input
type="number"
placeholder="Monto"
value={monto}
onChange={e=>setMonto(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"
/>

<select
value={comercio}
onChange={e=>setComercio(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"
>

<option>Texaco</option>
<option>UNO</option>
<option>Esso</option>

</select>

<input
type="file"
onChange={e=>setImg(e.target.files[0])}
/>

<button
onClick={enviarTicket}
className="w-full bg-red-600 p-3 rounded"
>
Enviar ticket
</button>

</div>

</div>

)}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
