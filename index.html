<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZUNO</title>

<link rel="icon" href="recursos/zlogo.png">
<link rel="apple-touch-icon" href="recursos/zlogo.png">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#09090F;
font-family:'Plus Jakarta Sans',sans-serif;
color:white;
}

/* HEADER */

header{
display:flex;
align-items:center;
gap:10px;
padding:16px;
border-bottom:1px solid #1e1e35;
}

.logo{
width:34px;
height:34px;
}

.brand-name{
font-weight:700;
font-size:18px;
}

.brand-tag{
font-size:11px;
color:#8888aa;
}

/* LOGIN */

.login{
max-width:420px;
margin:auto;
margin-top:60px;
}

.login-card{
background:#14141C;
padding:25px;
border-radius:14px;
}

.login-logo{
text-align:center;
margin-bottom:20px;
}

.login-logo img{
width:60px;
}

.login-logo p{
font-size:12px;
color:#8888aa;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:8px;
border:none;
background:#1a1a2e;
color:white;
}

button{
width:100%;
padding:12px;
background:#E8192C;
border:none;
border-radius:10px;
color:white;
font-weight:600;
cursor:pointer;
}

.link{
text-align:center;
margin-top:10px;
font-size:13px;
color:#aaa;
cursor:pointer;
}

/* DASHBOARD */

.dashboard{
display:none;
padding:20px;
}

.balance-card{
background:#14141C;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.balance{
font-size:28px;
font-weight:700;
}

/* TICKET */

.ticket-card{
background:#14141C;
padding:20px;
border-radius:12px;
}

/* NAV */

nav{
display:none;
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:12px 0;
}

nav button{
background:none;
border:none;
color:white;
font-size:14px;
}

</style>

</head>

<body>

<header>

<img src="recursos/zlogo.png" class="logo">

<div>
<div class="brand-name">ZUNO</div>
<div class="brand-tag">Tu dinero más rápido ⚡</div>
</div>

</header>

<!-- LOGIN -->

<div class="login" id="login">

<div class="login-card">

<div class="login-logo">

<img src="recursos/zlogo.png">

<h2>ZUNO</h2>

<p>Tu dinero más rápido ⚡</p>

</div>

<input id="email" placeholder="Correo">

<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Iniciar sesión</button>

<div class="link" onclick="registro()">Crear cuenta</div>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard" id="app">

<div class="balance-card">

<h3>Saldo ZUNO</h3>

<div class="balance">$0.00</div>

</div>

<div class="ticket-card">

<h3>Subir ticket</h3>

<input id="monto" type="number" placeholder="Monto compra">

<select>

<option>Texaco</option>
<option>UNO</option>
<option>Esso</option>

</select>

<input type="file">

<button onclick="ticket()">Enviar ticket</button>

</div>

</div>

<nav id="nav">

<button>Inicio</button> <button>Ticket</button> <button>Comercios</button> <button>Perfil</button>

</nav>

<script>

function login(){

let email=document.getElementById("email").value

if(!email){
alert("Ingresa tus datos")
return
}

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
document.getElementById("nav").style.display="flex"

}

function registro(){
alert("Pantalla de registro próximamente")
}

function ticket(){

let monto=document.getElementById("monto").value

if(!monto){
alert("Ingresa monto")
return
}

let cashback=monto*0.03

alert(
"Ticket enviado\n\n"+
"Cashback estimado $"+cashback.toFixed(2)
)

}

</script>

</body>
</html>
