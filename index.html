<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZUNO</title>

<link rel="icon" href="recursos/zlogo.png">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

:root{
--primary:#E8192C;
--surface:#111827;
--card:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);
--text:#f1f5f9;
}

body{
background:
radial-gradient(circle at 20% 20%,#1f2937,transparent),
radial-gradient(circle at 80% 0%,#111827,transparent),
#0a0e1a;

font-family:'DM Sans',sans-serif;
color:var(--text);
}

.card{
background:var(--card);
border:1px solid var(--border);
backdrop-filter:blur(10px);
border-radius:16px;
padding:20px;
}

.btn{
background:linear-gradient(135deg,#E8192C,#c81424);
padding:14px;
border-radius:12px;
font-weight:600;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
}

input,select{
background:rgba(255,255,255,0.05);
border:1px solid var(--border);
padding:12px;
border-radius:12px;
width:100%;
}

.sidebar{
position:fixed;
top:0;
left:0;
width:250px;
height:100%;
background:#0f172a;
padding:20px;
transform:translateX(-100%);
transition:.3s;
}

.sidebar.open{
transform:translateX(0);
}

.message{
color:#f87171;
font-size:14px;
margin-top:8px;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect}=React

const firebaseConfig={
apiKey:"AIzaSyAqXjnH6WrXuEQivE3RGwvav1qyFOOyoeY",
authDomain:"zuno-1285e.firebaseapp.com",
projectId:"zuno-1285e"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

function App(){

const [view,setView]=useState("login")
const [sidebar,setSidebar]=useState(false)
const [user,setUser]=useState(null)

const [message,setMessage]=useState("")

const [phone,setPhone]=useState("")
const [password,setPassword]=useState("")

const [form,setForm]=useState({
nombre:"",
birth:"",
dui:"",
correo:"",
direccion:"",
telefono:"",
password:""
})

/* LOGIN */

const login=async()=>{

setMessage("")

const snap=await db.collection("users")
.where("phone","==",phone)
.where("password","==",password)
.get()

if(snap.empty){
setMessage("Usuario o contraseña incorrectos")
return
}

const doc=snap.docs[0]

setUser({id:doc.id,...doc.data()})

setView("home")

}

/* REGISTRO */

const register=async()=>{

setMessage("")

let dui=form.dui.replace(/-/g,"")

const dup=await db.collection("users")
.where("dui","==",dui)
.get()

if(!dup.empty){
setMessage("Este DUI ya está registrado")
return
}

const dupPhone=await db.collection("users")
.where("phone","==",form.telefono)
.get()

if(!dupPhone.empty){
setMessage("Este teléfono ya está registrado")
return
}

await db.collection("users").add({
nombre:form.nombre,
birth:form.birth,
dui:dui,
correo:form.correo,
direccion:form.direccion,
phone:form.telefono,
password:form.password,
balance:0,
verified:false,
duiPhoto:null
})

setView("login")
setMessage("Cuenta creada correctamente")

}

/* SUBIR DUI */

const uploadDUI=(file)=>{

const reader=new FileReader()

reader.readAsDataURL(file)

reader.onload=async(e)=>{

await db.collection("users").doc(user.id).update({
duiPhoto:e.target.result
})

setMessage("Documento enviado para verificación")

}

}

return(

<div className="min-h-screen">

{/* SIDEBAR */}

<div className={`sidebar ${sidebar?"open":""}`}>

<h2 className="text-xl mb-6 font-bold">ZUNO</h2>

<button onClick={()=>setView("home")}>Inicio</button><br/>
<button onClick={()=>setView("ticket")}>Subir Ticket</button><br/>
<button onClick={()=>setView("tickets")}>Mis Tickets</button><br/>
<button onClick={()=>setView("profile")}>Perfil</button>

</div>

{/* HEADER */}

<header className="p-4 flex items-center gap-4">

{view!=="login" && view!=="register" && (
<button onClick={()=>setSidebar(!sidebar)}>☰</button>
)}

<img src="recursos/zlogo.png" className="w-6"/>

<h2 className="font-bold">ZUNO</h2>

</header>

{/* LOGIN */}

{view==="login" && (

<div className="p-6">

<div className="card max-w-sm mx-auto space-y-3">

<h2 className="text-xl font-bold">Login</h2>

<input
placeholder="Teléfono"
value={phone}
onChange={e=>setPhone(e.target.value)}/>

<input
type="password"
placeholder="Contraseña"
value={password}
onChange={e=>setPassword(e.target.value)}/>

{message && <p className="message">{message}</p>}

<button className="btn w-full" onClick={login}>Entrar</button>

<button onClick={()=>{setView("register");setMessage("")}}>
Crear cuenta
</button>

</div>

</div>

)}

{/* REGISTRO */}

{view==="register" && (

<div className="p-6">

<div className="card max-w-md mx-auto space-y-3">

<h2 className="text-xl font-bold">Registro</h2>

<input placeholder="Nombre"
onChange={e=>setForm({...form,nombre:e.target.value})}/>

<input type="date"
onChange={e=>setForm({...form,birth:e.target.value})}/>

<input placeholder="DUI sin guiones"
onChange={e=>setForm({...form,dui:e.target.value})}/>

<input placeholder="Teléfono"
onChange={e=>setForm({...form,telefono:e.target.value})}/>

<input placeholder="Correo"
onChange={e=>setForm({...form,correo:e.target.value})}/>

<input placeholder="Dirección"
onChange={e=>setForm({...form,direccion:e.target.value})}/>

<input type="password"
placeholder="Contraseña"
onChange={e=>setForm({...form,password:e.target.value})}/>

{message && <p className="message">{message}</p>}

<button className="btn w-full" onClick={register}>Crear cuenta</button>

</div>

</div>

)}

{/* PERFIL */}

{view==="profile" && user && (

<div className="p-6">

<div className="card max-w-md space-y-3">

<h2 className="font-bold text-lg">Perfil</h2>

<p>Nombre: {user.nombre}</p>
<p>DUI: {user.dui}</p>
<p>Teléfono: {user.phone}</p>

<p>Estado KYC: {user.verified?"Verificado":"Pendiente"}</p>

<input type="file"
onChange={(e)=>uploadDUI(e.target.files[0])}/>

{message && <p className="message">{message}</p>}

</div>

</div>

)}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
