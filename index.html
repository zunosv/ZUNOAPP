<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZUNO</title>

<link rel="icon" href="recursos/zlogo.png">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
background:#09090F;
}
</style>

</head>

<body class="text-white">

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect} = React

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyAqXjnH6WrXuEQivE3RGwvav1qyFOOyoeY",
authDomain:"zuno-1285e.firebaseapp.com",
projectId:"zuno-1285e"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

/* COMPRESION IMAGEN */

function compressImage(file){

return new Promise(resolve=>{

const reader = new FileReader()

reader.readAsDataURL(file)

reader.onload = e =>{

const img = new Image()

img.src = e.target.result

img.onload = ()=>{

const canvas = document.createElement("canvas")
const ctx = canvas.getContext("2d")

const width = 600
const scale = width / img.width

canvas.width = width
canvas.height = img.height * scale

ctx.drawImage(img,0,0,canvas.width,canvas.height)

resolve(canvas.toDataURL("image/jpeg",0.6))

}

}

})

}

function App(){

const [view,setView] = useState("login")

const [user,setUser] = useState(null)

const [tab,setTab] = useState("home")

/* LOGIN */

const [phone,setPhone] = useState("")
const [password,setPassword] = useState("")

/* REGISTRO */

const [nombre,setNombre] = useState("")
const [dui,setDui] = useState("")
const [correo,setCorreo] = useState("")
const [regPhone,setRegPhone] = useState("")
const [regPass,setRegPass] = useState("")

/* TICKET */

const [monto,setMonto] = useState("")
const [comercio,setComercio] = useState("Texaco")
const [img,setImg] = useState(null)

/* LOGIN */

const login = async()=>{

const snap = await db.collection("users")
.where("phone","==",phone)
.where("password","==",password)
.get()

if(snap.empty){

alert("Usuario no encontrado")

return

}

const doc = snap.docs[0]

setUser({id:doc.id,...doc.data()})

setView("dashboard")

}

/* REGISTRO */

const registrar = async()=>{

if(!nombre||!dui||!correo||!regPhone||!regPass){

alert("Completa todos los campos")

return

}

await db.collection("users").add({

nombre,
dui,
correo,
phone:regPhone,
password:regPass,

balance:0,
totalCashback:0,
tickets:0,

createdAt:Date.now()

})

alert("Cuenta creada")

setView("login")

}

/* SUBIR TICKET */

const enviarTicket = async()=>{

if(!img||!monto){

alert("Completa los datos")

return

}

const compressed = await compressImage(img)

await db.collection("tickets").add({

userId:user.id,
userName:user.nombre,
userPhone:user.phone,

monto:parseFloat(monto),
comercio,

status:"pending",

imgBase64:compressed,

createdAt:Date.now()

})

alert("Ticket enviado")

setMonto("")
setImg(null)

}

useEffect(()=>{

setTimeout(()=>{

lucide.createIcons()

},100)

})

return(

<div className="min-h-screen flex flex-col">

{/* HEADER */}

<header className="flex items-center gap-3 p-4 border-b border-gray-800">

<img src="recursos/zlogo.png" className="w-8"/>

<div>

<div className="font-bold text-lg">ZUNO</div>

<div className="text-xs text-gray-400">
Tu dinero más rápido ⚡
</div>

</div>

</header>

{/* LOGIN */}

{view==="login" && (

<div className="flex flex-1 items-center justify-center p-6">

<div className="bg-[#14141C] p-8 rounded-2xl w-full max-w-sm">

<h2 className="text-xl font-bold mb-4">
Iniciar sesión
</h2>

<input
placeholder="Teléfono"
value={phone}
onChange={e=>setPhone(e.target.value)}
className="w-full p-3 mb-3 rounded bg-[#1a1a2e]"
/>

<input
type="password"
placeholder="Contraseña"
value={password}
onChange={e=>setPassword(e.target.value)}
className="w-full p-3 mb-4 rounded bg-[#1a1a2e]"
/>

<button
onClick={login}
className="w-full bg-red-600 p-3 rounded-xl"
>

Entrar

</button>

<p
onClick={()=>setView("register")}
className="text-center mt-4 text-gray-400 cursor-pointer"
>

Crear cuenta

</p>

</div>

</div>

)}

{/* REGISTRO */}

{view==="register" && (

<div className="flex flex-1 items-center justify-center p-6">

<div className="bg-[#14141C] p-8 rounded-2xl w-full max-w-sm space-y-3">

<h2 className="text-xl font-bold text-center">
Registro ZUNO
</h2>

<input placeholder="Nombre completo"
value={nombre}
onChange={e=>setNombre(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"/>

<input placeholder="DUI"
value={dui}
onChange={e=>setDui(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"/>

<input placeholder="Correo"
value={correo}
onChange={e=>setCorreo(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"/>

<input placeholder="Teléfono"
value={regPhone}
onChange={e=>setRegPhone(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"/>

<input type="password"
placeholder="Contraseña"
value={regPass}
onChange={e=>setRegPass(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"/>

<button
onClick={registrar}
className="w-full bg-red-600 p-3 rounded-xl"
>

Registrarme

</button>

<p
onClick={()=>setView("login")}
className="text-center text-gray-400 cursor-pointer"
>

Volver

</p>

</div>

</div>

)}

{/* DASHBOARD */}

{view==="dashboard" && user && (

<div className="flex-1 p-6 pb-24 space-y-6">

{/* SALUDO */}

<div>

<h2 className="text-xl font-bold">

Hola {user.nombre}

</h2>

<p className="text-gray-400 text-sm">

Bienvenido a ZUNO

</p>

</div>

{/* WALLET */}

<div className="bg-gradient-to-r from-red-600 to-red-500 p-6 rounded-2xl">

<div className="flex items-center gap-2 text-sm opacity-80">

<i data-lucide="wallet"></i>

Saldo disponible

</div>

<h2 className="text-3xl font-bold mt-2">

${user.balance}

</h2>

</div>

{/* SUBIR TICKET */}

{tab==="ticket" && (

<div className="bg-[#14141C] p-6 rounded-xl space-y-3">

<h3 className="flex items-center gap-2 font-semibold">

<i data-lucide="receipt"></i>

Subir ticket

</h3>

<input
type="number"
placeholder="Monto"
value={monto}
onChange={e=>setMonto(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"
/>

<div className="grid grid-cols-3 gap-3">

<div className="bg-[#1a1a2e] p-3 rounded-xl flex flex-col items-center">
<i data-lucide="fuel"></i>
<p className="text-xs">Texaco</p>
</div>

<div className="bg-[#1a1a2e] p-3 rounded-xl flex flex-col items-center">
<i data-lucide="zap"></i>
<p className="text-xs">UNO</p>
</div>

<div className="bg-[#1a1a2e] p-3 rounded-xl flex flex-col items-center">
<i data-lucide="droplet"></i>
<p className="text-xs">Esso</p>
</div>

</div>

<input
type="file"
onChange={e=>setImg(e.target.files[0])}
/>

<button
onClick={enviarTicket}
className="w-full bg-red-600 p-3 rounded-xl"
>

Enviar ticket

</button>

</div>

)}

</div>

)}

{/* NAV */}

{view==="dashboard" && (

<nav className="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around py-3">

<button
onClick={()=>setTab("home")}
className="flex flex-col items-center text-xs">

<i data-lucide="home"></i>

Inicio

</button>

<button
onClick={()=>setTab("ticket")}
className="flex flex-col items-center text-xs">

<i data-lucide="receipt"></i>

Ticket

</button>

<button
className="flex flex-col items-center text-xs">

<i data-lucide="list"></i>

Tickets

</button>

<button
className="flex flex-col items-center text-xs">

<i data-lucide="user"></i>

Perfil

</button>

</nav>

)}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
