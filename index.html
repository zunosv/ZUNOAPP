<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZUNO</title>

<link rel="icon" href="recursos/zlogo.png">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{background:#09090F;}
</style>

</head>

<body class="text-white">

<div id="root"></div>

<script type="text/babel">

const {useState} = React

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyAqXjnH6WrXuEQivE3RGwvav1qyFOOyoeY",
authDomain:"zuno-1285e.firebaseapp.com",
projectId:"zuno-1285e"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

function App(){

const [view,setView] = useState("login")
const [user,setUser] = useState(null)
const [error,setError] = useState("")
const [tab,setTab] = useState("home")

/* LOGIN */

const [phone,setPhone] = useState("")
const [password,setPassword] = useState("")

/* BOT REGISTRO */

const questions = [
{
q:"¿Cuál es tu nombre completo?",
field:"nombre",
placeholder:"Ej: Juan Pérez"
},

{
q:"¿Cuál es tu fecha de nacimiento?",
field:"birth",
placeholder:"Formato: DD/MM/AAAA"
},

{
q:"Ingresa tu DUI",
field:"dui",
placeholder:"Formato: 12345678-9"
},

{
q:"Correo electrónico",
field:"correo",
placeholder:"Ej: correo@email.com"
},

{
q:"Dirección",
field:"direccion",
placeholder:"Ej: Santa Tecla, La Libertad"
}

]

const [step,setStep] = useState(0)
const [answer,setAnswer] = useState("")
const [data,setData] = useState({})

/* LOGIN */

const login = async()=>{

setError("")

const snap = await db.collection("users")
.where("phone","==",phone)
.where("password","==",password)
.get()

if(snap.empty){

setError("Usuario o contraseña incorrecta")

return

}

const doc = snap.docs[0]

setUser({id:doc.id,...doc.data()})

setView("dashboard")

}

/* BOT NEXT */

const nextQuestion = ()=>{

if(!answer){

setError("Este campo es obligatorio")

return

}

setError("")

const newData = {...data,[questions[step].field]:answer}

setData(newData)

setAnswer("")

if(step+1 < questions.length){

setStep(step+1)

}else{

saveUser(newData)

}

}

/* GUARDAR USUARIO */

const saveUser = async(userData)=>{

await db.collection("users").add({

...userData,
phone,
password,

balance:0,
totalCashback:0,
tickets:0,

createdAt:Date.now()

})

setView("login")

}

return(

<div className="min-h-screen flex flex-col">

<header className="p-4 border-b border-gray-800 flex items-center gap-3">

<img src="recursos/zlogo.png" className="w-8"/>

<div>

<div className="font-bold">ZUNO</div>
<div className="text-xs text-gray-400">
Tu dinero más rápido ⚡
</div>

</div>

</header>

{/* LOGIN */}

{view==="login" && (

<div className="flex flex-1 items-center justify-center p-6">

<div className="bg-[#14141C] p-8 rounded-xl w-80 space-y-3">

<h2 className="text-xl text-center font-bold">

Iniciar sesión

</h2>

<input
placeholder="Teléfono (ej: 70123456)"
value={phone}
onChange={e=>setPhone(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"
/>

<input
type="password"
placeholder="Contraseña"
value={password}
onChange={e=>setPassword(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"
/>

{error && (

<p className="text-red-400 text-sm text-center">

{error}

</p>

)}

<button
onClick={login}
className="w-full bg-red-600 p-3 rounded-xl">

Entrar

</button>

<p
onClick={()=>setView("bot")}
className="text-center text-gray-400 cursor-pointer">

Crear cuenta

</p>

</div>

</div>

)}

{/* BOT INTERACTIVO */}

{view==="bot" && (

<div className="p-6 space-y-6">

<h2 className="text-xl font-bold">

Bot ZUNO

</h2>

<p className="text-gray-400">

Paso {step+1} de {questions.length}

</p>

<div className="bg-[#14141C] p-4 rounded-xl">

🤖 {questions[step].q}

</div>

<input
placeholder={questions[step].placeholder}
value={answer}
onChange={e=>setAnswer(e.target.value)}
className="w-full p-3 rounded bg-[#1a1a2e]"
/>

{error && (

<p className="text-red-400 text-sm">

{error}

</p>

)}

<button
onClick={nextQuestion}
className="w-full bg-red-600 p-3 rounded-xl">

Continuar

</button>

</div>

)}

{/* DASHBOARD */}

{view==="dashboard" && user && (

<div className="flex-1 p-6 pb-24 space-y-6">

{/* HOME */}

{tab==="home" && (

<>

<h2 className="text-xl font-bold">
Hola {user.nombre}
</h2>

<div className="bg-gradient-to-r from-red-600 to-red-500 p-6 rounded-2xl">

<p>Saldo disponible</p>

<h2 className="text-3xl font-bold">
${user.balance}
</h2>

</div>

</>

)}

{/* TICKETS */}

{tab==="tickets" && (

<div className="bg-[#14141C] p-6 rounded-xl">

<h3 className="font-semibold mb-3">

Mis tickets

</h3>

<p className="text-gray-400 text-sm">

Aquí aparecerán tus tickets enviados.

</p>

</div>

)}

{/* PERFIL */}

{tab==="profile" && (

<div className="bg-[#14141C] p-6 rounded-xl space-y-2">

<h3 className="font-semibold">

Perfil

</h3>

<p>Nombre: {user.nombre}</p>

<p>Teléfono: {user.phone}</p>

<p>Correo: {user.correo}</p>

</div>

)}

</div>

)}

{/* NAV BAR INFERIOR */}

{view==="dashboard" && (

<nav className="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around py-3">

<button onClick={()=>setTab("home")}>
Inicio
</button>

<button onClick={()=>setTab("tickets")}>
Tickets
</button>

<button onClick={()=>setTab("profile")}>
Perfil
</button>

</nav>

)}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
